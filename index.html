<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>LLM History</title>
        <link rel="stylesheet" href="styles.css">
        <!-- Scripts loaded sequentially -->
        <script src="data.js"></script>
        <script src="main.js" defer></script>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>The Rise of LLMs</h1>
                <p class="subtitle">
                    A brief history of Large Language Models. From the launch of
                    ChatGPT to the agentic future of 2026.
                </p>
            </header>
            <main>
                <llm-timeline></llm-timeline>
            </main>

            <!-- Source Modal -->
            <div id="source-modal" class="modal">
                <div class="modal-content">
                    <span class="close-btn">&times;</span>
                    <h2 id="modal-title">Model</h2>
                    <p id="modal-date">Date</p>
                    <a
                        id="modal-link"
                        href="#"
                        target="_blank"
                        rel="noopener noreferrer"
                    >查看信息来源 (View Source)</a>
                </div>
            </div>

            <footer>
                <p>
                    <strong>Note:</strong> Timelines for 2026 are based on
                    current projections. All dates are approximate.
                </p>
            </footer>
        </div>
    </body>
</html>
